<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Minza Health</title>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
 
  <nav class="nav">
    <div class="nav__brand">
      <span class="nav__logo">Min<span>za</span></span>
      <span class="nav__role">Admin</span>
    </div>
    <div class="nav__links" style="display:flex;gap:1.5rem;margin-left:2rem;">
      <a href="admin.html" class="nav__link nav__link--active">Dashboard</a>
      <a href="prescriptions.html" class="nav__link">Prescriptions</a>
      <a href="revenue.html" class="nav__link">Revenue</a>
      <a href="staff.html" class="nav__link">Staff</a>
      <a href="settings.html" class="nav__link">Settings</a>
    </div>
    <div class="nav__right">
      <span class="conn-pill" id="conn-pill"></span>
      <span class="nav__user" id="nav-user">—</span>
      <button class="btn btn--ghost btn--sm" id="logout-btn">Sign out</button>
    </div>
  </nav>
 
  <main class="page">
 
    <div class="page-header">
      <div>
        <h1 class="page-title" id="clinic-name">Dashboard</h1>
        <p class="page-sub" id="today-date">—</p>
      </div>
    </div>
 
    <!-- Top Metrics -->
    <div class="stats-grid" style="margin-bottom:1.75rem;">
      <div class="stat-card stat-card--terra">
        <div class="stat-label">Visits Today</div>
        <div class="stat-num" id="stat-visits">—</div>
      </div>
      <div class="stat-card stat-card--sage">
        <div class="stat-label">Total Patients</div>
        <div class="stat-num" id="stat-patients">—</div>
      </div>
      <div class="stat-card stat-card--gold">
        <div class="stat-label">Revenue Today</div>
        <div class="stat-num" id="stat-revenue" style="font-size:1.25rem;">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending Rx</div>
        <div class="stat-num" id="stat-rx">—</div>
      </div>
    </div>
 
    <!-- Recent Prescriptions Preview -->
    <div class="card">
      <div class="card__header">
        <h2 class="card__title">Recent Prescriptions</h2>
        <a href="prescriptions.html" class="btn btn--sm btn--ghost">View All →</a>
      </div>
      <div id="recent-prescriptions-container">
        <div class="state-empty">Loading…</div>
      </div>
    </div>
 
  </main>
 
  <script type="module">
    import { protectRoute, logout, getUserName, getOrgName } from '../js/modules/auth.js';
    import { apiRequest } from '../js/services/api.js';
    import { initConnPill, showToast } from '../js/utils/ui.js';
    import { fmtUGX, escapeHtml, fmtDate } from '../js/utils/format.js';
 
    const user = protectRoute(['admin']);
    if (!user) throw new Error();
 
    initConnPill('conn-pill');
    document.getElementById('nav-user').textContent = getUserName();
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('clinic-name').textContent = getOrgName();
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
 
    // Load top stats
    async function loadStats() {
      try {
        const stats = await apiRequest('/stats');
        document.getElementById('stat-visits').textContent   = stats.total_visits   ?? 0;
        document.getElementById('stat-patients').textContent = stats.total_patients ?? 0;
        document.getElementById('stat-revenue').textContent  = fmtUGX(stats.revenue_today ?? 0);
        document.getElementById('stat-rx').textContent       = stats.pending_rx ?? 0;
      } catch (err) {
        showToast('Could not load stats', 'error');
      }
    }
 
    // Load recent prescriptions preview (limit 5)
    async function loadRecentPrescriptions() {
      const container = document.getElementById('recent-prescriptions-container');
      try {
        const data = await apiRequest('/prescriptions?limit=5');
        if (!data.length) {
          container.innerHTML = `<div class="state-empty">No recent prescriptions</div>`;
          return;
        }
        container.innerHTML = data.map(p => `
          <div class="queue-item" style="padding:0.75rem 0;border-bottom:1px solid var(--border);">
            <div class="queue-item__info">
              <div class="queue-item__name">${escapeHtml(p.patient_name)}</div>
              <div class="queue-item__meta">${escapeHtml(p.drug)} · ${fmtDate(p.created_at)}</div>
            </div>
            <span class="badge ${p.status === 'fulfilled' ? 'badge--success' : 'badge--warn'}">${p.status}</span>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = `<div class="state-empty">Failed to load prescriptions</div>`;
      }
    }
 
    await loadStats();
    await loadRecentPrescriptions();
  </script>
 
</body>
</html>
