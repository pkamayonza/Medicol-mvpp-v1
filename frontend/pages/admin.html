<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Minza Health</title>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
 
  <nav class="nav">
    <div class="nav__brand">
      <span class="nav__logo">Min<span>za</span></span>
      <span class="nav__role">Admin</span>
    </div>
    <div class="nav__right">
      <span class="conn-pill" id="conn-pill"></span>
      <span class="nav__user" id="nav-user">—</span>
      <button class="btn btn--ghost btn--sm" id="logout-btn">Sign out</button>
    </div>
  </nav>
 
  <main class="page">
 
    <div class="page-header">
      <div>
        <h1 class="page-title" id="clinic-name">Admin</h1>
        <p class="page-sub" id="today-date">—</p>
      </div>
    </div>
 
    <!-- Stats -->
    <div class="stats-grid" style="margin-bottom:1.75rem;">
      <div class="stat-card stat-card--terra">
        <div class="stat-label">Visits Today</div>
        <div class="stat-num" id="stat-visits">—</div>
      </div>
      <div class="stat-card stat-card--sage">
        <div class="stat-label">Total Patients</div>
        <div class="stat-num" id="stat-patients">—</div>
      </div>
      <div class="stat-card stat-card--gold">
        <div class="stat-label">Revenue Today</div>
        <div class="stat-num" id="stat-revenue" style="font-size:1.25rem;">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending Rx</div>
        <div class="stat-num" id="stat-rx">—</div>
      </div>
    </div>
 
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;">
 
      <!-- Users -->
      <div>
        <div class="card">
          <div class="card__header">
            <h2 class="card__title">Team Members</h2>
            <button class="btn btn--sm btn--primary" id="add-user-btn">+ Add User</button>
          </div>
          <div id="users-body"></div>
        </div>
      </div>
 
      <!-- Quick Links -->
      <div>
        <div class="card">
          <div class="card__header">
            <h2 class="card__title">Navigation</h2>
          </div>
          <div style="display:flex;flex-direction:column;gap:0.5rem;">
            <a href="queue.html"           class="btn btn--secondary btn--full" style="justify-content:flex-start;">Reception Queue</a>
            <a href="doctor-queue.html"    class="btn btn--secondary btn--full" style="justify-content:flex-start;">Doctor Queue</a>
            <a href="pharmacy-queue.html"  class="btn btn--secondary btn--full" style="justify-content:flex-start;">Pharmacy Queue</a>
            <a href="patients.html"        class="btn btn--secondary btn--full" style="justify-content:flex-start;">All Patients</a>
          </div>
        </div>
 
        <div class="card card--inset" style="border-left:3px solid var(--terra);">
          <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.9px;color:var(--terra);margin-bottom:0.5rem;">System Info</div>
          <div style="font-size:0.82rem;color:var(--text-3);line-height:1.7;">
            <div>Mode: <span style="color:var(--text);font-family:var(--mono);">STUB (demo data)</span></div>
            <div>Version: <span style="color:var(--text);font-family:var(--mono);">1.0.0</span></div>
            <div>Stack: <span style="color:var(--text);font-family:var(--mono);">Vanilla JS + FastAPI</span></div>
          </div>
        </div>
      </div>
 
    </div>
 
  </main>
 
  <!-- Add User Modal -->
  <div class="modal" id="modal-user">
    <div class="modal__card">
      <div class="modal__header">
        <span class="modal__title">Add Team Member</span>
        <button class="modal__close" data-close="modal-user">✕</button>
      </div>
      <form id="user-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="u-name">Full Name *</label>
          <input class="form-input" type="text" id="u-name" placeholder="e.g. Dr. Sarah Kato" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="u-email">Email *</label>
          <input class="form-input" type="email" id="u-email" placeholder="sarah@clinic.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="u-role">Role *</label>
          <select class="form-select" id="u-role" required>
            <option value="">Select role</option>
            <option value="receptionist">Receptionist</option>
            <option value="doctor">Doctor</option>
            <option value="pharmacist">Pharmacist</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="user-error" class="form-error" style="display:none;"></div>
        <div class="modal__footer">
          <button type="button" class="btn btn--ghost" data-close="modal-user">Cancel</button>
          <button type="submit" class="btn btn--primary" id="user-submit">Create User →</button>
        </div>
      </form>
    </div>
  </div>
 
  <script type="module">
    import { protectRoute, logout, getUserName, getOrgName } from '../js/modules/auth.js';
    import { apiRequest, DB } from '../js/services/api.js';
    import { initConnPill, showToast, openModal, closeModal, bindCloseButtons } from '../js/utils/ui.js';
    import { escapeHtml, fmtUGX } from '../js/utils/format.js';
 
    const user = protectRoute(['admin']);
    if (!user) throw new Error();
 
    initConnPill('conn-pill');
    bindCloseButtons();
    document.getElementById('nav-user').textContent = getUserName();
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('clinic-name').textContent = getOrgName();
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
 
    // ── Load stats ────────────────────────────────────────────────────
    async function loadStats() {
      try {
        const stats = await apiRequest('/stats');
        document.getElementById('stat-visits').textContent   = stats.total_visits   ?? 0;
        document.getElementById('stat-patients').textContent = stats.total_patients ?? 0;
        document.getElementById('stat-revenue').textContent  = fmtUGX(stats.revenue_today ?? 0);
        document.getElementById('stat-rx').textContent       = stats.pending_rx ?? 0;
      } catch (_) {}
    }
 
    // ── Render Users (extended with actions and revoked style) ───────
    function renderUsers() {
      const body = document.getElementById('users-body');
      const roleEmoji = { receptionist: 'R', doctor: 'D', pharmacist: 'P', admin: 'A' };
      const roleColors = { receptionist: 'badge--terra', doctor: 'badge--terra', pharmacist: 'badge--terra', admin: 'badge--terra' };
 
      if (!DB.users.length) {
        body.innerHTML = `<div class="state-empty" style="padding:1.5rem 0;"><div class="state-empty__title">No users yet</div></div>`;
        return;
      }
 
      body.innerHTML = DB.users.map(u => `
        <div class="queue-item" style="padding:0.875rem 0;border-bottom:1px solid var(--border); opacity:${u.disabled ? 0.5 : 1};">
          <div class="queue-item__avatar" style="width:36px;height:36px;font-size:1rem;background:var(--surface-2);border-color:var(--border-2);">
            ${roleEmoji[u.role] || '👤'}
          </div>
          <div class="queue-item__info">
            <div class="queue-item__name">${escapeHtml(u.name)}</div>
            <div class="queue-item__meta">${escapeHtml(u.email)}</div>
          </div>
          <span class="badge ${roleColors[u.role] || 'badge--muted'}" style="text-transform:capitalize;">${u.role}</span>
          ${u.disabled ? '<span class="badge badge--muted" style="margin-left:0.5rem;">Revoked</span>' : ''}
          <div style="display:flex;gap:0.5rem;margin-left:auto;">
            <button class="btn btn--ghost btn--sm revoke-btn" data-id="${u.id}">
              Revoke
            </button>
            <button class="btn btn--ghost btn--sm delete-btn" data-id="${u.id}" style="color:red;">
              Remove
            </button>
          </div>
        </div>`).join('');
    }
 
    // ── Bind user action buttons (delete & revoke) ───────────────────
    function bindUserActions() {
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;

          // Prevent admin from deleting themselves
          if (id == user.id) {
            showToast("You cannot remove yourself", "error");
            return;
          }

          if (!confirm('Are you sure you want to permanently remove this user?')) return;

          try {
            await apiRequest(`/users/${id}`, 'DELETE');

            DB.users = DB.users.filter(u => u.id != id);

            renderUsers();
            bindUserActions();

            showToast('User removed successfully', 'success');
          } catch (err) {
            showToast('Failed to remove user', 'error');
          }
        });
      });

      document.querySelectorAll('.revoke-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;

          try {
            await apiRequest(`/users/${id}/revoke`, 'PATCH');

            const targetUser = DB.users.find(u => u.id == id);
            if (targetUser) targetUser.disabled = true;
                
            renderUsers();
            bindUserActions();

            showToast('Access revoked', 'success');
          } catch (err) {
            showToast('Failed to revoke access', 'error');
          }
        });
      });
    }
 
    // ── Add User ──────────────────────────────────────────────────────
    document.getElementById('add-user-btn').addEventListener('click', () => openModal('modal-user'));
 
    document.getElementById('user-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn   = document.getElementById('user-submit');
      const errEl = document.getElementById('user-error');
      errEl.style.display = 'none';
 
      const name  = document.getElementById('u-name').value.trim();
      const email = document.getElementById('u-email').value.trim();
      const role  = document.getElementById('u-role').value;
 
      if (!name || !email || !role) {
        errEl.textContent   = 'All fields are required.';
        errEl.style.display = 'block';
        return;
      }
 
      btn.disabled    = true;
      btn.textContent = 'Creating…';
 
      try {
        await apiRequest('/users', 'POST', { name, email, role });
        closeModal('modal-user');
        document.getElementById('user-form').reset();
        showToast(`${name} added as ${role}.`, 'success');
        renderUsers();
        bindUserActions();   // re‑attach listeners after render
      } catch (err) {
        errEl.textContent   = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Create User →';
      }
    });
 
    // ── Initial load ──────────────────────────────────────────────────
    await loadStats();
    renderUsers();
    bindUserActions();   // attach listeners after first render
  </script>
 
</body>
</html>
