<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visit — Minza Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
 
  <nav class="nav">
    <div class="nav__left">
      <span class="nav__logo">Min<span>za</span></span>
      <a href="dashboard.html" class="nav__back">← Back to Queue</a>
    </div>
    <div class="nav__right">
      <span id="conn-pill" class="conn-pill"></span>
      <button class="btn btn--ghost btn--sm" id="logout-btn">Sign Out</button>
    </div>
  </nav>
 
  <main class="page page--visit">
 
    <!-- Patient Banner -->
    <div class="patient-banner patient-banner--full">
      <div class="patient-banner__avatar" id="patient-avatar">—</div>
      <div class="patient-banner__info">
        <div class="patient-banner__name" id="patient-name">Loading…</div>
        <div class="patient-banner__meta" id="patient-meta">—</div>
      </div>
      <div class="patient-banner__status">
        <span class="badge" id="visit-status-badge">—</span>
      </div>
    </div>
 
    <div class="visit-grid">
 
      <!-- LEFT: Consultation + Prescription -->
      <div class="visit-left">
 
        <!-- Step 1: Consultation -->
        <div class="card">
          <div class="card__header">
            <div class="step-badge">1</div>
            <h2 class="card__title">Consultation</h2>
          </div>
          <div id="consult-view" style="display:none;"></div>
          <form id="consult-form" style="display:none;" novalidate>
            <div class="form-group">
              <label for="symptoms">Symptoms / Presenting Complaint</label>
              <textarea id="symptoms" name="symptoms" rows="2"
                placeholder="e.g. Fever for 3 days, headache, joint pains"></textarea>
            </div>
            <div class="form-group">
              <label for="diagnosis">Diagnosis *</label>
              <input type="text" id="diagnosis" name="diagnosis"
                placeholder="e.g. Malaria — confirmed by RDT" required/>
            </div>
            <div class="form-group">
              <label for="notes">Clinical Notes</label>
              <textarea id="notes" name="notes" rows="3"
                placeholder="History, examination, management plan…"></textarea>
            </div>
            <div class="form-error" id="consult-error" style="display:none;"></div>
            <div class="form-actions">
              <button type="submit" class="btn btn--primary">Save Consultation</button>
            </div>
          </form>
        </div>
 
        <!-- Step 2: Prescription -->
        <div class="card">
          <div class="card__header">
            <div class="step-badge">2</div>
            <h2 class="card__title">Prescription</h2>
          </div>
 
          <div id="rx-view" style="display:none;"></div>
 
          <div id="rx-builder" style="display:none;">
            <div class="drug-entry">
              <div class="form-row">
                <div class="form-group form-group--grow">
                  <label>Drug Name *</label>
                  <input type="text" id="drug-name" placeholder="e.g. Coartem 20/120mg"/>
                </div>
                <div class="form-group">
                  <label>Dosage</label>
                  <input type="text" id="drug-dosage" placeholder="e.g. 4 tabs BD x 3d"/>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Qty</label>
                  <input type="number" id="drug-qty" min="1" value="1" style="width:80px;"/>
                </div>
                <div class="form-group">
                  <label>Unit Price (UGX)</label>
                  <input type="number" id="drug-price" min="0" placeholder="0"/>
                </div>
                <div class="form-group" style="align-self:flex-end;">
                  <button type="button" class="btn btn--primary btn--full" id="add-drug-btn">
                    + Add Drug
                  </button>
                </div>
              </div>
            </div>
 
            <div id="rx-items" class="rx-items"></div>
 
            <div class="rx-total-row">
              <span>Total</span>
              <strong id="rx-total">UGX 0</strong>
            </div>
 
            <div class="card card--inset">
              <h3 class="section-label">Send to Pharmacy</h3>
              <div class="form-group">
                <label for="pharmacy-select">Select Pharmacy *</label>
                <select id="pharmacy-select">
                  <option value="">Loading pharmacies…</option>
                </select>
              </div>
              <div class="form-error" id="rx-error" style="display:none;"></div>
              <div class="form-actions">
                <button class="btn btn--primary" id="send-rx-btn">
                  Save & Send Prescription →
                </button>
              </div>
            </div>
          </div>
        </div>
 
      </div><!-- /visit-left -->
 
      <!-- RIGHT: Billing -->
      <div class="visit-right">
        <div class="card">
          <div class="card__header">
            <div class="step-badge">3</div>
            <h2 class="card__title">Bill & Payment</h2>
          </div>
 
          <div id="bill-view">
            <div class="empty-state">Save a prescription first to create a bill.</div>
          </div>
 
          <div id="payment-form-section" style="display:none;">
            <form id="payment-form" novalidate>
              <div class="form-row">
                <div class="form-group">
                  <label for="pay-method">Method</label>
                  <select id="pay-method" name="method">
                    <option value="cash">Cash</option>
                    <option value="momo">MTN MoMo</option>
                  </select>
                </div>
                <div class="form-group form-group--grow">
                  <label for="pay-amount">Amount (UGX) *</label>
                  <input type="number" id="pay-amount" name="amount" min="1" placeholder="0"/>
                </div>
              </div>
              <div class="form-group" id="momo-ref-group" style="display:none;">
                <label for="pay-ref">MoMo Reference</label>
                <input type="text" id="pay-ref" name="reference" placeholder="e.g. MP2501234"/>
              </div>
              <div class="form-error" id="pay-error" style="display:none;"></div>
              <div class="form-actions">
                <button type="submit" class="btn btn--primary btn--full">Record Payment</button>
              </div>
            </form>
          </div>
        </div>
      </div><!-- /visit-right -->
 
    </div><!-- /visit-grid -->
 
  </main>
 
  <div id="toast" class="toast"></div>
  <script src="../js/modules/app.js"></script>
 
  <script type="module">
    import { protectRoute, logout }                               from '../js/modules/auth.js';
    import { fetchVisitById, updateVisitStatus, VISIT_STATUS }    from '../js/modules/visits.js';
    import { fetchConsultationByVisit, bindConsultationForm,
             renderConsultationCard }                             from '../js/modules/consultations.js';
    import { createItemsStore, fetchPrescriptionByVisit,
             createPrescription, renderItems,
             renderPrescriptionCard }                             from '../js/modules/prescriptions.js';
    import { fetchLinkedPharmacies, sendToPharmacy,
             renderPharmacySelector }                             from '../js/modules/pharmacy.js';
    import { fetchBillByVisit, createBill,
             renderBillSummary, bindPaymentForm }                 from '../js/modules/payments.js';
    import { initConnPill, showToast }                            from '../js/utils/ui.js';
    import { escapeHtml, fmtAge }                                 from '../js/utils/format.js';
 
    // Boot 
    const user = await protectRoute();
    if (!user) throw new Error('No session');
 
    const connPillEl = document.getElementById('conn-pill');
    if (connPillEl) connPillEl.dataset.moduleWired = '1';
    initConnPill('conn-pill');
    document.getElementById('logout-btn').addEventListener('click', logout);
 
    // Visit ID from URL 
    const params  = new URLSearchParams(window.location.search);
    const visitId = params.get('id');
    if (!visitId) {
      window.location.href = 'dashboard.html';
      throw new Error('No visit ID');
    }
 
    // In-memory item store (one instance per page load) 
    const store = createItemsStore();
 
    // Load visit 
    const visit = await fetchVisitById(visitId);
    if (!visit) {
      showToast('Visit not found.', 'error');
      window.location.href = 'dashboard.html';
      throw new Error('Visit not found');
    }
 
    const patient = visit.patients || {};
 
    // Patient banner initials
    const initials = (patient.full_name || '?').trim().split(/\s+/)
      .slice(0, 2).map(w => w[0].toUpperCase()).join('');
    document.getElementById('patient-avatar').textContent = initials;
    document.getElementById('patient-name').textContent   = patient.full_name || '—';
    document.getElementById('patient-meta').textContent   =
      [patient.phone, patient.gender, patient.dob ? fmtAge(patient.dob) : null]
        .filter(Boolean).join(' · ');
 
    // Visit status badge
    const statusMap = {
      waiting:    { cls: 'badge--warn',    label: 'Waiting'    },
      in_consult: { cls: 'badge--info',    label: 'In Consult' },
      completed:  { cls: 'badge--success', label: 'Completed'  },
    };
    const { cls, label } = statusMap[visit.status] || { cls: 'badge--neutral', label: visit.status };
    const badge = document.getElementById('visit-status-badge');
    badge.textContent = label;
    badge.className   = `badge ${cls}`;
 
    // Consultation 
    let consultation  = await fetchConsultationByVisit(visitId);
    const consultView = document.getElementById('consult-view');
    const consultForm = document.getElementById('consult-form');
 
    if (consultation) {
      renderConsultationCard(consultView, consultation);
      consultView.style.display = 'block';
      consultForm.style.display = 'none';
    } else {
      consultForm.style.display = 'block';
    }
 
    bindConsultationForm(consultForm, visitId, saved => {
      consultation = saved;
      renderConsultationCard(consultView, saved);
      consultView.style.display = 'block';
      consultForm.style.display = 'none';
      initRxBuilder();
    });
 
    // Prescription Builder 
    // Guard flag: event listeners are wired exactly once
    let _rxBuilderInitialised = false;
 
    async function initRxBuilder() {
      const rxView    = document.getElementById('rx-view');
      const rxBuilder = document.getElementById('rx-builder');
 
      // If prescription already exists, show read-only card
      const existing = await fetchPrescriptionByVisit(visitId);
      if (existing) {
        renderPrescriptionCard(rxView, existing);
        rxView.style.display    = 'block';
        rxBuilder.style.display = 'none';
        await initBilling();
        return;
      }
 
      rxBuilder.style.display = 'block';
 
      if (_rxBuilderInitialised) return;
      _rxBuilderInitialised = true;
 
      // Populate pharmacy dropdown
      const pharmacies = await fetchLinkedPharmacies();
      renderPharmacySelector(
        document.getElementById('pharmacy-select'),
        pharmacies,
        user.id
      );
 
      // Add drug — shared between button click and Enter key
      function addDrug() {
        const nameEl   = document.getElementById('drug-name');
        const dosageEl = document.getElementById('drug-dosage');
        const qtyEl    = document.getElementById('drug-qty');
        const priceEl  = document.getElementById('drug-price');
 
        if (!nameEl.value.trim()) {
          nameEl.focus();
          showToast('Enter a drug name.', 'warn');
          return;
        }
 
        try {
          const items = store.add({
            drug_name: nameEl.value,
            dosage:    dosageEl.value,
            quantity:  qtyEl.value,
            price:     priceEl.value,
          });
          const rxItems = document.getElementById('rx-items');
          renderItems(rxItems, items, key => {
            store.remove(key);
            renderItems(rxItems, store.getAll(), null);
          });
          nameEl.value = dosageEl.value = priceEl.value = '';
          qtyEl.value  = '1';
          nameEl.focus();
        } catch (err) {
          showToast(err.message, 'error');
        }
      }
 
      document.getElementById('add-drug-btn').addEventListener('click', addDrug);
      document.getElementById('drug-name').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); addDrug(); }
      });
 
      // Send prescription to pharmacy
      document.getElementById('send-rx-btn').addEventListener('click', async () => {
        const errEl      = document.getElementById('rx-error');
        const sendBtn    = document.getElementById('send-rx-btn');
        const selectEl   = document.getElementById('pharmacy-select');
        const pharmacyId = selectEl.value;
        const orderType  = selectEl.options[selectEl.selectedIndex]?.dataset?.type || 'internal';
 
        errEl.style.display = 'none';
        sendBtn.disabled    = true;
        sendBtn.textContent = 'Saving…';
 
        try {
          const items = store.getAll();
          if (!items.length) throw new Error('Add at least one drug.');
          if (!pharmacyId)   throw new Error('Select a pharmacy first.');
 
          const prescription = await createPrescription(visitId, items);
          if (!prescription) {
            showToast('Queued offline — will send when back online.', 'warn');
            return;
          }
 
          await sendToPharmacy(prescription.id, pharmacyId, orderType);
 
          const saved = await fetchPrescriptionByVisit(visitId);
          renderPrescriptionCard(rxView, saved);
          rxView.style.display    = 'block';
          rxBuilder.style.display = 'none';
          showToast('Prescription sent to pharmacy.');
 
          const total = store.getTotal();
          store.clear();
          await initBilling(total);
 
        } catch (err) {
          errEl.textContent   = err.message;
          errEl.style.display = 'block';
        } finally {
          sendBtn.disabled    = false;
          sendBtn.textContent = 'Save & Send Prescription →';
        }
      });
    }
 
    // Billing 
    // Guard: payment form listeners wired exactly once
    let _billId           = null;
    let _paymentFormBound = false;
 
    async function initBilling(total = null) {
      const billSection = document.getElementById('bill-view');
      const paySection  = document.getElementById('payment-form-section');
 
      let bill = await fetchBillByVisit(visitId);
      if (!bill && total && total > 0) {
        bill = await createBill(visitId, total);
      }
 
      if (!bill) {
        billSection.innerHTML = `<div class="empty-state">No bill yet.</div>`;
        return;
      }
 
      _billId = bill.id;
      renderBillSummary(billSection, bill);
 
      if (bill.status === 'paid') {
        paySection.style.display = 'none';
        return;
      }
 
      paySection.style.display = 'block';
 
      // Pre-fill outstanding balance
      const paid = (bill.payments || [])
        .filter(p => p.status === 'success')
        .reduce((s, p) => s + Number(p.amount), 0);
      document.getElementById('pay-amount').value =
        Math.max(0, Number(bill.total_amount) - paid) || '';
 
      if (!_paymentFormBound) {
        _paymentFormBound = true;
 
        document.getElementById('pay-method').addEventListener('change', e => {
          document.getElementById('momo-ref-group').style.display =
            e.target.value === 'momo' ? 'block' : 'none';
        });
 
        bindPaymentForm(document.getElementById('payment-form'), _billId, async () => {
          const updated = await fetchBillByVisit(visitId);
          renderBillSummary(billSection, updated);
 
          if (updated?.status === 'paid') {
            paySection.style.display = 'none';
            showToast('Bill fully paid. ✓');
          } else {
            // Recalculate and update outstanding field
            const newPaid = (updated?.payments || [])
              .filter(p => p.status === 'success')
              .reduce((s, p) => s + Number(p.amount), 0);
            document.getElementById('pay-amount').value =
              Math.max(0, Number(updated?.total_amount) - newPaid) || '';
          }
        });
      }
    }
 
    // On load: restore existing state 
    if (consultation) {
      const existing = await fetchPrescriptionByVisit(visitId);
      if (existing) {
        const rxView = document.getElementById('rx-view');
        renderPrescriptionCard(rxView, existing);
        rxView.style.display = 'block';
        document.getElementById('rx-builder').style.display = 'none';
        await initBilling();
      } else {
        await initRxBuilder();
      }
    }
 
  </script>

</body>
</html>
