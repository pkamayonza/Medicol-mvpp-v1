<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Minza Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
 
  <nav class="nav">
    <div class="nav__left">
      <span class="nav__logo">Min<span>za</span></span>
      <span class="nav__org" id="nav-org">—</span>
    </div>
    <div class="nav__center">
      <a href="dashboard.html" class="nav__tab nav__tab--active">Dashboard</a>
      <a href="patients.html"  class="nav__tab">Patients</a>
      <a href="pharmacy.html"  class="nav__tab">Pharmacy</a>
      <a href="payments.html"  class="nav__tab">Payments</a>
    </div>
    <div class="nav__right">
      <span id="conn-pill" class="conn-pill"></span>
      <button class="btn btn--ghost btn--sm" id="logout-btn">Sign Out</button>
    </div>
  </nav>
 
  <main class="page">
 
    <div class="page-header">
      <div>
        <div class="page-title" id="facility-name"></div>
        <div class="page-subtitle" id="today-date"></div>
      </div>
      <button class="btn btn--primary" id="new-patient-btn">+ New Patient</button>
    </div>
 
    <!-- Alert bar: waiting patients, low stock, etc. -->
    <div class="alert-bar alert-bar--warn" id="alert-bar" style="display:none;">
      <span id="alert-text"></span>
    </div>
 
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card__label">Total Visits Today</div>
        <div class="stat-card__num" data-stat="totalVisits"></div>
        <div class="stat-card__sub">all statuses</div>
      </div>
      <div class="stat-card" id="stat-waiting">
        <div class="stat-card__label">Waiting</div>
        <div class="stat-card__num" data-stat="waitingCount"></div>
        <div class="stat-card__sub">in queue</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">In Consult</div>
        <div class="stat-card__num" data-stat="inConsultCount"></div>
        <div class="stat-card__sub">with doctor</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Completed</div>
        <div class="stat-card__num" data-stat="completedCount"></div>
        <div class="stat-card__sub">today</div>
      </div>
      <div class="stat-card" id="stat-pending-rx">
        <div class="stat-card__label">Pending Rx</div>
        <div class="stat-card__num" data-stat="pendingRxCount"></div>
        <div class="stat-card__sub">prescriptions</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Revenue Today</div>
        <div class="stat-card__num" data-stat="todayRevenue"></div>
        <div class="stat-card__sub">collected</div>
      </div>
    </div>
 
    <!-- Queue -->
    <div class="card">
      <div class="card__header">
        <h2 class="card__title">Today's Queue</h2>
        <button class="btn btn--sm btn--outline" id="refresh-queue">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Patient</th>
              <th>Time</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="queue-body">
            <tr><td colspan="5" class="loading">Loading </td></tr>
          </tbody>
        </table>
      </div>
    </div>
 
  </main>
 
  <div id="toast" class="toast"></div>
 
  <script type="module">
    import { protectRoute, logout, getOrgType, getOrgName } from '../js/modules/auth.js';
    import { fetchDashboardData, renderStats }              from '../js/modules/dashboard.js';
    import { fetchTodaysVisits, renderQueue }               from '../js/modules/visits.js';
    import { initConnPill, showToast }                      from '../js/utils/ui.js';
 
    // Boot 
    const user = await protectRoute();
    if (!user) throw new Error('No session'); // protectRoute already redirected
 
    // Redirect pharmacy accounts away from the clinic dashboard
    if (getOrgType() === 'pharmacy') {
      window.location.href = 'pharmacy.html';
    }
 
    initConnPill('conn-pill');
 
    const orgName = getOrgName();
    document.getElementById('nav-org').textContent       = orgName;
    document.getElementById('facility-name').textContent = orgName;
    document.getElementById('today-date').textContent    =
      new Date().toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
 
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('new-patient-btn').addEventListener('click', () => {
      window.location.href = 'patients.html?action=new';
    });
 
    // Load 
    async function loadDashboard() {
      // Skeleton loading state
      document.querySelectorAll('.stat-card').forEach(c => c.classList.add('stat-card--loading'));
 
      try {
        const [stats, visits] = await Promise.all([
          fetchDashboardData(),
          fetchTodaysVisits(),
        ]);
 
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('stat-card--loading'));
        renderStats(stats);
 
        // Highlight stat cards on alert conditions
        document.getElementById('stat-waiting')
          ?.classList.toggle('stat-card--warn', stats.waitingCount > 5);
        document.getElementById('stat-pending-rx')
          ?.classList.toggle('stat-card--warn', stats.pendingRxCount > 0);
 
        // Alert bar for patients waiting > 10 minutes
        const longWait = visits.filter(v => {
          if (v.status !== 'waiting') return false;
          return (Date.now() - new Date(v.created_at).getTime()) > 10 * 60 * 1000;
        });
        const alertBar  = document.getElementById('alert-bar');
        const alertText = document.getElementById('alert-text');
        if (longWait.length) {
          alertText.textContent =
            `${longWait.length} patient${longWait.length > 1 ? 's have' : ' has'} been waiting over 10 minutes.`;
          alertBar.style.display = 'flex';
        } else {
          alertBar.style.display = 'none';
        }
 
        renderQueue(document.getElementById('queue-body'), visits, {
          onConsult: visitId => { window.location.href = `visit.html?id=${visitId}`; },
          onView:    visitId => { window.location.href = `visit.html?id=${visitId}`; },
        });
 
      } catch (err) {
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('stat-card--loading'));
        showToast(err.message || 'Failed to load dashboard.', 'error');
        document.getElementById('queue-body').innerHTML =
          `<tr><td colspan="5" class="empty-state">Could not load queue. Check your connection.</td></tr>`;
      }
    }
 
    await loadDashboard();
 
    document.getElementById('refresh-queue').addEventListener('click', loadDashboard);
    setInterval(loadDashboard, 60_000);
  </script>

  <script src="../js/modules/app.js"></script>
  <script src="../js/modules/dashboard.js"></script>
 
</body>
</html>
