<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Minza Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
 
  <!-- NAV -->
  <nav class="nav">
    <div class="nav__left">
      <span class="nav__logo">Min<span>za</span></span>
      <span class="nav__org" id="nav-org">—</span>
    </div>
    <div class="nav__center">
      <a href="dashboard.html"  class="nav__tab nav__tab--active">Dashboard</a>
      <a href="patients.html"   class="nav__tab">Patients</a>
      <a href="pharmacy.html"   class="nav__tab">Pharmacy</a>
      <a href="payments.html"   class="nav__tab">Payments</a>
    </div>
    <div class="nav__right">
      <span id="conn-pill" class="conn-pill"></span>
      <button class="btn btn--ghost btn--sm" id="logout-btn">Sign Out</button>
    </div>
  </nav>
 
  <!-- MAIN -->
  <main class="page">
 
    <!-- Header -->
    <div class="page-header">
      <div>
        <div class="page-title" id="facility-name">—</div>
        <div class="page-subtitle" id="today-date">—</div>
      </div>
      <button class="btn btn--primary" id="new-patient-btn">
        + New Patient
      </button>
    </div>
 
    <!-- Alert bar (low stock, pending etc) -->
    <div class="alert-bar alert-bar--warn" id="alert-bar" style="display:none;">
      <span id="alert-text"></span>
    </div>
 
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card__label">Total Visits Today</div>
        <div class="stat-card__num" data-stat="totalVisits">—</div>
        <div class="stat-card__sub">all statuses</div>
      </div>
      <div class="stat-card" id="stat-waiting">
        <div class="stat-card__label">Waiting</div>
        <div class="stat-card__num" data-stat="waitingCount">—</div>
        <div class="stat-card__sub">in queue</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">In Consult</div>
        <div class="stat-card__num" data-stat="inConsultCount">—</div>
        <div class="stat-card__sub">with doctor</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Completed</div>
        <div class="stat-card__num" data-stat="completedCount">—</div>
        <div class="stat-card__sub">today</div>
      </div>
      <div class="stat-card" id="stat-pending-rx">
        <div class="stat-card__label">Pending Rx</div>
        <div class="stat-card__num" data-stat="pendingRxCount">—</div>
        <div class="stat-card__sub">prescriptions</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Revenue Today</div>
        <div class="stat-card__num" data-stat="todayRevenue">—</div>
        <div class="stat-card__sub">collected</div>
      </div>
    </div>
 
    <!-- Today's Queue -->
    <div class="card">
      <div class="card__header">
        <h2 class="card__title">Today's Queue</h2>
        <button class="btn btn--sm btn--outline" id="refresh-queue">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Patient</th>
              <th>Time</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="queue-body">
            <tr><td colspan="5" class="loading">Loading queue…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
 
  </main>
 
  <!-- Toast -->
  <div id="toast" class="toast"></div>
 
  <script type="module">
    import { protectRoute, logout, getCurrentUser, getOrgType } from '../js/modules/auth.js';
    import { fetchDashboardData, renderStats }                  from '../js/modules/dashboard.js';
    import { fetchTodaysVisits, renderQueue, VISIT_STATUS }     from '../js/modules/visits.js';
    import { initConnPill, showToast }                          from '../js/utils/ui.js';
    import { fmtDate }                                          from '../js/utils/format.js';
 
    // ── Boot ─────────────────────────────────────────────────────────────────
    const user = await protectRoute();
    if (!user) throw new Error('No session');  // protectRoute redirects
 
    // Guard: pharmacy users go to their own page
    if (getOrgType() === 'pharmacy') {
      window.location.href = 'pharmacy.html';
    }
 
    // ── UI Bootstrap ─────────────────────────────────────────────────────────
    initConnPill('conn-pill');
 
    const meta = user.user_metadata || {};
    document.getElementById('nav-org').textContent      = meta.org_name || user.email;
    document.getElementById('facility-name').textContent = meta.org_name || 'Clinic';
    document.getElementById('today-date').textContent   =
      new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
 
    document.getElementById('logout-btn').addEventListener('click', logout);
 
    // ── New Patient → patients.html ───────────────────────────────────────────
    document.getElementById('new-patient-btn').addEventListener('click', () => {
      window.location.href = 'patients.html?action=new';
    });
 
    // ── Load Data ─────────────────────────────────────────────────────────────
    async function loadDashboard() {
      try {
        const [stats, visits] = await Promise.all([
          fetchDashboardData(),
          fetchTodaysVisits(),
        ]);
 
        renderStats(stats);
 
        // Highlight stat cards on alert conditions
        document.getElementById('stat-waiting')?.classList
          .toggle('stat-card--warn', stats.waitingCount > 5);
        document.getElementById('stat-pending-rx')?.classList
          .toggle('stat-card--warn', stats.pendingRxCount > 0);
 
        const queueBody = document.getElementById('queue-body');
        renderQueue(queueBody, visits, {
          onConsult: (visitId) => {
            window.location.href = `visit.html?id=${visitId}`;
          },
          onView: (visitId) => {
            window.location.href = `visit.html?id=${visitId}`;
          },
        });
      } catch (err) {
        showToast(err.message, 'error');
      }
    }
 
    await loadDashboard();
 
    document.getElementById('refresh-queue').addEventListener('click', loadDashboard);
 
    // Auto-refresh every 60 seconds
    setInterval(loadDashboard, 60_000);
  </script>
 
</body>
</html>
