<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minza Health — Sign In</title>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body class="auth-body">
 
  <div class="auth-card">
 
    <div class="auth-logo">
      <div class="auth-logo__mark">Min<span>za</span></div>
      <div class="auth-logo__sub">prescription to payment visibility</div>
    </div>
 
    <div id="login-error" class="form-error" style="display:none;"></div>
 
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@clinic.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn--primary btn--full btn--lg" id="login-btn" style="margin-top:0.5rem;">
        Sign In 
      </button>
    </form>
 
    <div class="auth-divider">demo credentials</div>
 
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
      <button class="btn btn--ghost btn--sm" onclick="fillCreds('reception@clinic.com')">Reception</button>
      <button class="btn btn--ghost btn--sm" onclick="fillCreds('doctor@clinic.com')">Doctor</button>
      <button class="btn btn--ghost btn--sm" onclick="fillCreds('pharmacy@clinic.com')">Pharmacy</button>
      <button class="btn btn--ghost btn--sm" onclick="fillCreds('admin@clinic.com')">Admin</button>
    </div>
 
    <p style="text-align:center;font-size:0.72rem;color:var(--text-3);margin-top:1rem;">
      Password for all demo accounts: <code style="color:var(--terra);font-family:var(--mono);">minza123</code>
    </p>
 
  </div>
 
  <div class="toast-container" id="toast-container"></div>
 
  <script type="module">
    import { login, redirectIfLoggedIn, roleHome } from '../js/modules/auth.js';
 
    redirectIfLoggedIn();
 
    window.fillCreds = function(email) {
      document.getElementById('email').value    = email;
      document.getElementById('password').value = 'minza123';
    };
 
    const form   = document.getElementById('login-form');
    const btn    = document.getElementById('login-btn');
    const errEl  = document.getElementById('login-error');
 
    form.addEventListener('submit', async e => {
      e.preventDefault();
      errEl.style.display = 'none';
      btn.disabled    = true;
      btn.textContent = 'Signing in…';
 
      try {
        const data = await login(
          form.email.value.trim(),
          form.password.value
        );
        window.location.href = roleHome(data.user?.user_metadata?.role);
      } catch (err) {
        errEl.textContent   = err.message;
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.textContent     = 'Sign In →';
      }
    });
  </script>
 
</body>
</html>
