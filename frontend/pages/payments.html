<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payments — Minza Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>

  <nav class="nav">
    <div class="nav__left">
      <span class="nav__logo">Min<span>za</span></span>
      <span class="nav__org" id="nav-org">—</span>
    </div>
    <div class="nav__center">
      <a href="dashboard.html" class="nav__tab">Dashboard</a>
      <a href="patients.html"  class="nav__tab">Patients</a>
      <a href="pharmacy.html"  class="nav__tab">Pharmacy</a>
      <a href="payments.html"  class="nav__tab nav__tab--active">Payments</a>
    </div>
    <div class="nav__right">
      <span id="conn-pill" class="conn-pill"></span>
      <button class="btn btn--ghost btn--sm" id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <main class="page">

    <div class="page-header">
      <h1 class="page-title">Payments</h1>
      <!-- Date range filter -->
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
        <input type="date" id="from-date" class="date-input"/>
        <span style="color:#94A3B8;font-size:0.875rem;">to</span>
        <input type="date" id="to-date" class="date-input"/>
        <button class="btn btn--outline btn--sm" id="apply-filter">Apply</button>
      </div>
    </div>

    <!-- Summary Stats -->
    <div class="payment-stat-grid">
      <div class="stat-card">
        <div class="stat-card__label">Total Collected</div>
        <div class="stat-card__num" id="stat-total-collected">—</div>
        <div class="stat-card__sub">in period</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Cash</div>
        <div class="stat-card__num" id="stat-cash">—</div>
        <div class="stat-card__sub">payments</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Mobile Money</div>
        <div class="stat-card__num" id="stat-momo">—</div>
        <div class="stat-card__sub">payments</div>
      </div>
      <div class="stat-card" id="stat-outstanding-card">
        <div class="stat-card__label">Outstanding</div>
        <div class="stat-card__num" id="stat-outstanding">—</div>
        <div class="stat-card__sub">unpaid bills</div>
      </div>
    </div>

    <!-- Payments Table -->
    <div class="card">
      <div class="card__header">
        <h2 class="card__title">Payment Records</h2>
        <div class="filter-tabs" id="method-tabs">
          <button class="filter-tab filter-tab--active" data-method="">All</button>
          <button class="filter-tab" data-method="cash">Cash</button>
          <button class="filter-tab" data-method="momo">MoMo</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Patient</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Reference</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="payment-body">
            <tr><td colspan="7" class="loading">Loading payments…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Bill Detail Modal -->
  <div class="modal" id="modal-bill">
    <div class="modal__card">
      <div class="modal__header">
        <h3>Bill Details</h3>
        <button class="modal__close" data-close="modal-bill">✕</button>
      </div>
      <div id="bill-detail-body"></div>
      <div class="modal__actions">
        <button class="btn btn--outline" data-close="modal-bill">Close</button>
        <button class="btn btn--primary" id="go-to-visit-btn">Open Visit →</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <style>
    .date-input {
      border: 1px solid #D1D9E0;
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: #0B1F3A;
      outline: none;
    }
    .date-input:focus { border-color: #0D6E6E; }
  </style>

  <script type="module">
    import { protectRoute, logout, getOrgId }     from '../js/modules/auth.js';
    import { apiRequest }                          from '../js/services/api.js';
    import { initConnPill, showToast, openModal, closeModal } from '../js/utils/ui.js';
    import { fmtDate, fmtUGX, escapeHtml }         from '../js/utils/format.js';

    // ── Boot ───────────────────────────────────────────────────────────────────
    const user = await protectRoute();
    document.getElementById('nav-org').textContent = user.user_metadata?.org_name || user.email;
    document.getElementById('logout-btn').addEventListener('click', logout);
    initConnPill('conn-pill');

    const orgId = getOrgId();

    // ── Default date range: current month ──────────────────────────────────────
    const now   = new Date();
    const y     = now.getFullYear();
    const m     = String(now.getMonth() + 1).padStart(2, '0');
    const today = now.toISOString().split('T')[0];
    const monthStart = `${y}-${m}-01`;

    document.getElementById('from-date').value = monthStart;
    document.getElementById('to-date').value   = today;

    // ── State ──────────────────────────────────────────────────────────────────
    let _allPayments = [];
    let _methodFilter = '';
    let _selectedBillId = null;

    // ── Load Payments ──────────────────────────────────────────────────────────
    async function loadPayments() {
      const from = document.getElementById('from-date').value;
      const to   = document.getElementById('to-date').value;
      const fromISO = from + 'T00:00:00';
      const toISO   = to   + 'T23:59:59';

      const body = document.getElementById('payment-body');
      body.innerHTML = `<tr><td colspan="7" class="loading">Loading…</td></tr>`;

      try {
        // Fetch payments joined with bills joined with visits joined with patients
        const payments = await apiRequest(
          `/payments?created_at=gte.${fromISO}&created_at=lte.${toISO}&order=created_at.desc` +
          `&select=*,bills!inner(id,total_amount,status,visits!inner(id,org_id,patients(full_name,phone)))` +
          `&bills.visits.org_id=eq.${orgId}`
        );

        _allPayments = payments || [];
        renderPayments(_methodFilter);
        renderStats();

      } catch (err) {
        body.innerHTML = `<tr><td colspan="7" class="loading">${err.message}</td></tr>`;
        showToast(err.message, 'error');
      }
    }

    // ── Render Payments ────────────────────────────────────────────────────────
    function renderPayments(methodFilter = '') {
      const body = document.getElementById('payment-body');
      const list = methodFilter
        ? _allPayments.filter(p => p.method === methodFilter)
        : _allPayments;

      if (!list.length) {
        body.innerHTML = `<tr><td colspan="7" class="empty-state">No payments found.</td></tr>`;
        return;
      }

      const statusBadge = s => {
        const map = {
          success: { cls: 'badge--success', label: 'Success' },
          pending: { cls: 'badge--warn',    label: 'Pending' },
          failed:  { cls: 'badge--danger',  label: 'Failed'  },
        };
        const { cls, label } = map[s] || { cls: 'badge--neutral', label: s };
        return `<span class="badge ${cls}">${label}</span>`;
      };

      body.innerHTML = list.map(p => {
        const bill    = p.bills || {};
        const visit   = bill.visits || {};
        const patient = visit.patients || {};
        const visitId = visit.id || null;

        return `<tr>
          <td>
            <div class="patient-name">${escapeHtml(patient.full_name || '—')}</div>
            <div class="text-muted text-sm">${patient.phone || '—'}</div>
          </td>
          <td style="font-weight:700;">${fmtUGX(p.amount)}</td>
          <td style="text-transform:capitalize;">${p.method}</td>
          <td class="text-muted text-sm">${p.reference || '—'}</td>
          <td>${statusBadge(p.status)}</td>
          <td class="text-muted text-sm">${fmtDate(p.created_at)}</td>
          <td class="td-actions">
            <button class="btn btn--sm btn--outline js-view-bill"
                    data-bill-id="${bill.id}"
                    data-visit-id="${visitId}">
              View
            </button>
          </td>
        </tr>`;
      }).join('');

      body.querySelectorAll('.js-view-bill').forEach(btn => {
        btn.addEventListener('click', () => {
          _selectedBillId = btn.dataset.billId;
          const visitId   = btn.dataset.visitId;
          openBillDetail(btn.dataset.billId, visitId);
        });
      });
    }

    // ── Render Stats ───────────────────────────────────────────────────────────
    function renderStats() {
      const successful = _allPayments.filter(p => p.status === 'success');
      const total      = successful.reduce((s, p) => s + Number(p.amount), 0);
      const cash       = successful.filter(p => p.method === 'cash').reduce((s, p) => s + Number(p.amount), 0);
      const momo       = successful.filter(p => p.method === 'momo').reduce((s, p) => s + Number(p.amount), 0);

      // Outstanding: sum of unpaid + partial bills in this org
      // We approximate from the payments we loaded
      const billIds  = new Set(_allPayments.map(p => p.bills?.id).filter(Boolean));
      let outstanding = 0;
      _allPayments.forEach(p => {
        const bill = p.bills;
        if (bill && bill.status !== 'paid') {
          outstanding = Number(bill.total_amount) || 0;
        }
      });

      document.getElementById('stat-total-collected').textContent = fmtUGX(total);
      document.getElementById('stat-cash').textContent             = fmtUGX(cash);
      document.getElementById('stat-momo').textContent             = fmtUGX(momo);
      document.getElementById('stat-outstanding').textContent      = outstanding > 0
        ? fmtUGX(outstanding)
        : 'UGX 0';

      document.getElementById('stat-outstanding-card')
        .classList.toggle('stat-card--warn', outstanding > 0);
    }

    // ── Bill Detail Modal ──────────────────────────────────────────────────────
    async function openBillDetail(billId, visitId) {
      if (!billId) return;
      const detailBody = document.getElementById('bill-detail-body');
      detailBody.innerHTML = `<div class="loading">Loading…</div>`;
      openModal('modal-bill');

      try {
        const bills = await apiRequest(
          `/bills?id=eq.${billId}&select=*,payments(*),visits(id,patients(full_name,phone))`
        );
        const bill    = bills?.[0];
        if (!bill) { detailBody.innerHTML = `<div class="empty-state">Bill not found.</div>`; return; }

        const patient  = bill.visits?.patients || {};
        const payments = bill.payments || [];
        const totalPaid = payments
          .filter(p => p.status === 'success')
          .reduce((s, p) => s + Number(p.amount), 0);
        const outstanding = Math.max(0, Number(bill.total_amount) - totalPaid);

        const statusBadge = s => {
          const map = { unpaid: 'badge--danger', partial: 'badge--warn', paid: 'badge--success' };
          return `<span class="badge ${map[s] || 'badge--neutral'}">${s}</span>`;
        };

        detailBody.innerHTML = `
          <div class="detail-section">
            <div class="detail-section__label">Patient</div>
            <div class="detail-section__value">${escapeHtml(patient.full_name || '—')}</div>
            <div class="text-muted text-sm">${patient.phone || '—'}</div>
          </div>

          <div class="bill-summary">
            <div class="bill-summary__row">
              <span>Total Amount</span>
              <strong>${fmtUGX(bill.total_amount)}</strong>
            </div>
            <div class="bill-summary__row">
              <span>Paid</span>
              <strong class="text-success">${fmtUGX(totalPaid)}</strong>
            </div>
            <div class="bill-summary__row bill-summary__row--outstanding">
              <span>Outstanding</span>
              <strong class="${outstanding > 0 ? 'text-danger' : 'text-success'}">${fmtUGX(outstanding)}</strong>
            </div>
            <div class="bill-summary__row">
              <span>Status</span>
              ${statusBadge(bill.status)}
            </div>
          </div>

          ${payments.length ? `
            <div class="payment-history">
              <div class="section-label">Payment History</div>
              ${payments.map(p => `
                <div class="payment-row">
                  <span class="payment-row__method">${p.method}</span>
                  <span class="payment-row__amount">${fmtUGX(p.amount)}</span>
                  ${p.reference ? `<span class="text-muted text-sm">${p.reference}</span>` : ''}
                  <span class="badge ${p.status === 'success' ? 'badge--success' : 'badge--warn'}">${p.status}</span>
                  <span class="text-muted text-sm">${fmtDate(p.created_at)}</span>
                </div>
              `).join('')}
            </div>
          ` : ''}`;

        // Wire visit link
        const visitBtn = document.getElementById('go-to-visit-btn');
        if (visitId) {
          visitBtn.style.display = 'inline-flex';
          visitBtn.onclick = () => {
            window.location.href = `visit.html?id=${visitId}`;
          };
        } else {
          visitBtn.style.display = 'none';
        }

      } catch (err) {
        detailBody.innerHTML = `<div class="empty-state">${err.message}</div>`;
      }
    }

    // ── Filter Tabs ────────────────────────────────────────────────────────────
    document.getElementById('method-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('filter-tab--active'));
      tab.classList.add('filter-tab--active');
      _methodFilter = tab.dataset.method;
      renderPayments(_methodFilter);
    });

    // ── Date Filter ────────────────────────────────────────────────────────────
    document.getElementById('apply-filter').addEventListener('click', loadPayments);

    // Close modals
    document.querySelectorAll('[data-close]').forEach(btn => {
      btn.addEventListener('click', () => closeModal(btn.dataset.close));
    });

    // ── Initial Load ───────────────────────────────────────────────────────────
    await loadPayments();
  </script>

</body>
</html>
