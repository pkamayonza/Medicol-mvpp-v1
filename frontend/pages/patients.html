<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patients — Minza Health</title>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
 
  <nav class="nav">
    <div class="nav__brand">
      <span class="nav__logo">Min<span>za</span></span>
      <span class="nav__role">Reception</span>
    </div>
    <div class="nav__links">
      <a href="queue.html"    class="nav__link">Queue</a>
      <a href="patients.html" class="nav__link nav__link--active">Patients</a>
    </div>
    <div class="nav__right">
      <span class="conn-pill" id="conn-pill"></span>
      <span class="nav__user" id="nav-user">—</span>
      <button class="btn btn--ghost btn--sm" id="logout-btn">Sign out</button>
    </div>
  </nav>
 
  <main class="page">
 
    <div class="page-header">
      <div>
        <h1 class="page-title">Patients</h1>
        <p class="page-sub" id="patient-count">—</p>
      </div>
    </div>
 
    <div class="search-bar">
      <span class="search-bar__icon"></span>
      <input type="text" id="search-input" placeholder="Search by name or phone…" autocomplete="off"/>
    </div>
 
    <div class="card card--flush">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Patient</th>
              <th>Gender</th>
              <th>Age</th>
              <th>Phone</th>
              <th>Registered</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="patient-body"></tbody>
        </table>
      </div>
    </div>
 
  </main>
 
  <!-- Patient Detail Modal -->
  <div class="modal" id="modal-detail">
    <div class="modal__card modal__card--wide">
      <div class="modal__header">
        <span class="modal__title" id="detail-name">Patient</span>
        <button class="modal__close" data-close="modal-detail">✕</button>
      </div>
      <div id="detail-body"></div>
      <div class="modal__footer">
        <button class="btn btn--ghost" data-close="modal-detail">Close</button>
        <button class="btn btn--primary" id="detail-new-visit">+ Start Visit</button>
      </div>
    </div>
  </div>
 
  <script type="module">
    import { protectRoute, logout, getUserName } from '../js/modules/auth.js';
    import { apiRequest } from '../js/services/api.js';
    import { initConnPill, showToast, openModal, closeModal, bindCloseButtons, setLoading, setEmpty } from '../js/utils/ui.js';
    import { fmtDate, fmtAge, escapeHtml, initials, fmtTime } from '../js/utils/format.js';
 
    const user = protectRoute(['receptionist', 'admin', 'doctor']);
    if (!user) throw new Error();
 
    initConnPill('conn-pill');
    bindCloseButtons();
    document.getElementById('nav-user').textContent = getUserName();
    document.getElementById('logout-btn').addEventListener('click', logout);
 
    let _patients = [];
    let _selectedPatient = null;
 
    async function loadPatients(q = '') {
      const body = document.getElementById('patient-body');
      setLoading(body, true, 6);
      try {
        const ep = q ? `/patients?search=${encodeURIComponent(q)}` : '/patients';
        _patients = await apiRequest(ep);
        document.getElementById('patient-count').textContent =
          `${_patients.length} patient${_patients.length !== 1 ? 's' : ''} registered`;
        render();
      } catch (err) {
        showToast(err.message, 'error');
        setEmpty(body, { icon: '⚠️', title: 'Failed to load', sub: err.message }, 6);
      }
    }
 
    function render() {
      const body = document.getElementById('patient-body');
      if (!_patients.length) {
        setEmpty(body, { icon: '👤', title: 'No patients found', sub: 'Try a different search term.' }, 6);
        return;
      }
 
      body.innerHTML = _patients.map(p => `
        <tr style="cursor:pointer;" class="js-patient-row" data-id="${p.id}">
          <td>
            <div style="display:flex;align-items:center;gap:0.6rem;">
              <div style="width:32px;height:32px;border-radius:50%;background:var(--terra-lt);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:var(--terra);flex-shrink:0;">${initials(p.full_name)}</div>
              <div style="font-weight:600;">${escapeHtml(p.full_name)}</div>
            </div>
          </td>
          <td style="text-transform:capitalize;">${p.gender || '—'}</td>
          <td>${fmtAge(p.dob)}</td>
          <td class="text-muted text-sm">${p.phone || '—'}</td>
          <td class="text-muted text-sm">${fmtDate(p.created_at)}</td>
          <td class="td-actions">
            <button class="btn btn--sm btn--secondary js-view" data-id="${p.id}">View History</button>
            <button class="btn btn--sm btn--primary js-visit" data-id="${p.id}" data-name="${escapeHtml(p.full_name)}">+ Visit</button>
          </td>
        </tr>`).join('');
 
      body.querySelectorAll('.js-view').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); openDetail(btn.dataset.id); });
      });
      body.querySelectorAll('.js-visit').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); startVisit(btn.dataset.id, btn.dataset.name); });
      });
    }
 
    async function openDetail(patientId) {
      _selectedPatient = _patients.find(p => p.id === patientId);
      if (!_selectedPatient) return;
 
      document.getElementById('detail-name').textContent = _selectedPatient.full_name;
      document.getElementById('detail-new-visit').dataset.id = patientId;
      document.getElementById('detail-new-visit').dataset.name = _selectedPatient.full_name;
 
      const body = document.getElementById('detail-body');
      body.innerHTML = `<div class="state-loading"><div class="state-loading__spinner"></div></div>`;
      openModal('modal-detail');
 
      try {
        // Load visit history for this patient
        const allVisits = await apiRequest('/visits');
        const visits = allVisits.filter(v => v.patient_id === patientId).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
 
        const statusMap = {
          waiting:    { cls: 'badge--warn',    label: 'Waiting'    },
          in_consult: { cls: 'badge--info',    label: 'In Consult' },
          completed:  { cls: 'badge--success', label: 'Completed'  },
        };
 
        body.innerHTML = `
          <div class="detail-grid mb-2">
            <div class="detail-item"><span class="detail-key">Phone</span><span class="detail-val">${_selectedPatient.phone || '—'}</span></div>
            <div class="detail-item"><span class="detail-key">Gender</span><span class="detail-val" style="text-transform:capitalize;">${_selectedPatient.gender || '—'}</span></div>
            <div class="detail-item"><span class="detail-key">Date of Birth</span><span class="detail-val">${fmtDate(_selectedPatient.dob)}</span></div>
            <div class="detail-item"><span class="detail-key">Age</span><span class="detail-val">${fmtAge(_selectedPatient.dob)}</span></div>
            <div class="detail-item"><span class="detail-key">Registered</span><span class="detail-val">${fmtDate(_selectedPatient.created_at)}</span></div>
            <div class="detail-item"><span class="detail-key">Total Visits</span><span class="detail-val text-terra">${visits.length}</span></div>
          </div>
          <div class="section-label mt-2">Visit History</div>
          ${visits.length ? visits.map(v => {
            const { cls, label } = statusMap[v.status] || { cls: 'badge--muted', label: v.status };
            return `
              <div class="visit-row">
                <span class="visit-row__date">${fmtDate(v.created_at)}</span>
                <div class="visit-row__info">
                  <div class="visit-row__diag">${v.status === 'completed' ? 'Completed visit' : label + ' visit'}</div>
                  <div class="visit-row__sub">${fmtTime(v.created_at)}</div>
                </div>
                <span class="badge ${cls}">${label}</span>
              </div>`;
          }).join('') : '<div class="state-empty" style="padding:1.5rem 0;"><div class="state-empty__title">No visits yet</div></div>'}`;
 
      } catch (err) {
        body.innerHTML = `<div class="form-error">${err.message}</div>`;
      }
    }
 
    async function startVisit(patientId, name) {
      try {
        const visit = await apiRequest('/visits', 'POST', {
          patient_id: patientId,
          status:     'waiting',
        });
        showToast(`Visit started for ${name}.`, 'success');
        window.location.href = `queue.html`;
      } catch (err) {
        showToast(err.message, 'error');
      }
    }
 
    document.getElementById('detail-new-visit').addEventListener('click', async function() {
      await startVisit(this.dataset.id, this.dataset.name);
    });
 
    // Search
    let _timer;
    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(_timer);
      _timer = setTimeout(() => loadPatients(e.target.value), 320);
    });
 
    await loadPatients();
  </script>
 
</body>
</html>
